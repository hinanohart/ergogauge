name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install (core + dev)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

      - name: Honesty / hygiene gate
        run: uv run python scripts/verify_step.py --strict

  honest-marketing:
    name: honest-marketing (denylist grep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Denylist grep must be zero (ERE, real rc)
        run: |
          set +e
          # Word-boundary ERE across shipped docs; 'first'/'best'/'SOTA'/'solves' etc.
          pattern='\b(permanent|completely|first|best|guaranteed|automatically|SOTA|solves|outperforms?)\b|世界初|業界初|完全保証|最高性能'
          hits=$(grep -rEniI "$pattern" README.md docs/ 2>/dev/null | grep -viE 'no claim|not a|claims? no|denylist|NON-CLAIM|we are not aware|makes no|not aware of' )
          if [ -n "$hits" ]; then
            echo "DENYLIST HIT:"; echo "$hits"; exit 1
          fi
          echo "denylist clean"

  torch-free-core:
    name: core-import-is-torch-free
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - run: |
          uv venv --python 3.12
          uv pip install -e .
          # Importing the core must not pull torch into sys.modules.
          uv run python -c "import sys, ergogauge; assert 'torch' not in sys.modules, 'core imported torch'; print('core torch-free OK')"
